<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구구단 테스트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <div id="quiz-screen">
    <h1>🔢 구구단 테스트</h1>
    <p class="subtitle">맞춰보세요!</p>

    <div class="dan-select">
      <label>단 선택 (복수 선택 가능)</label>
      <div class="dan-buttons" id="dan-buttons"></div>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="10">10문제</button>
      <button class="mode-btn" data-mode="20">20문제</button>
      <button class="mode-btn" data-mode="0">무제한</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value correct-val" id="correct-count">0</div>
        <div class="stat-label">정답</div>
      </div>
      <div class="stat">
        <div class="stat-value wrong-val" id="wrong-count">0</div>
        <div class="stat-label">오답</div>
      </div>
      <div class="stat">
        <div class="stat-value score-val" id="score-pct">-</div>
        <div class="stat-label">정답률</div>
      </div>
    </div>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="question-box">
      <div class="question-text" id="question-text">
        <span id="q-a">?</span>
        <span class="op"> × </span>
        <span id="q-b">?</span>
        <span class="op"> = </span>
        <span id="q-ans">?</span>
      </div>
    </div>

    <div class="answer-row">
      <input type="number" id="answer-input" placeholder="정답 입력" min="1" max="81">
      <button id="submit-btn">확인</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>

  <div id="result-screen" class="result-screen">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">완료!</div>
    <div class="result-score" id="result-score"></div>
    <button id="restart-btn">다시 도전</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
