<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구구단 테스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #4a3080;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    /* 단 선택 */
    .dan-select {
      margin-bottom: 24px;
    }

    .dan-select label {
      font-weight: 600;
      color: #555;
      display: block;
      margin-bottom: 10px;
    }

    .dan-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .dan-btn {
      width: 44px;
      height: 44px;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #555;
      transition: all 0.2s;
    }

    .dan-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }

    .dan-btn:hover:not(.active) {
      border-color: #667eea;
      color: #667eea;
    }

    /* 통계 */
    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 28px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #999;
      margin-top: 2px;
    }

    .correct-val { color: #22c55e; }
    .wrong-val   { color: #ef4444; }
    .score-val   { color: #667eea; }

    /* 문제 영역 */
    .question-box {
      background: linear-gradient(135deg, #f0f0ff, #e8e0ff);
      border-radius: 16px;
      padding: 32px 20px;
      margin-bottom: 24px;
    }

    .question-text {
      font-size: 2.8rem;
      font-weight: 700;
      color: #4a3080;
      letter-spacing: 4px;
    }

    .question-text .op { color: #764ba2; }

    /* 입력 */
    .answer-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    #answer-input {
      flex: 1;
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1.3rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    #answer-input:focus { border-color: #667eea; }
    #answer-input.correct { border-color: #22c55e; background: #f0fff4; }
    #answer-input.wrong   { border-color: #ef4444; background: #fff0f0; }

    #submit-btn {
      padding: 14px 22px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #submit-btn:hover { opacity: 0.85; }

    /* 피드백 */
    .feedback {
      font-size: 1.1rem;
      font-weight: 600;
      min-height: 28px;
      margin-bottom: 16px;
    }

    .feedback.correct { color: #22c55e; }
    .feedback.wrong   { color: #ef4444; }

    /* 진행 바 */
    .progress-wrap {
      background: #eee;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* 결과 화면 */
    .result-screen {
      display: none;
    }

    .result-emoji { font-size: 4rem; margin-bottom: 12px; }
    .result-title { font-size: 1.5rem; font-weight: 700; color: #4a3080; margin-bottom: 8px; }
    .result-score { font-size: 1.1rem; color: #666; margin-bottom: 28px; }

    #restart-btn {
      padding: 14px 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #restart-btn:hover { opacity: 0.85; }

    .mode-toggle {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .mode-btn {
      padding: 8px 18px;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }
  </style>
</head>
<body>
<div class="card">
  <div id="quiz-screen">
    <h1>🔢 구구단 테스트</h1>
    <p class="subtitle">맞춰보세요!</p>

    <!-- 단 선택 -->
    <div class="dan-select">
      <label>단 선택 (복수 선택 가능)</label>
      <div class="dan-buttons" id="dan-buttons"></div>
    </div>

    <!-- 모드 선택 -->
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="10">10문제</button>
      <button class="mode-btn" data-mode="20">20문제</button>
      <button class="mode-btn" data-mode="0">무제한</button>
    </div>

    <!-- 통계 -->
    <div class="stats">
      <div class="stat">
        <div class="stat-value correct-val" id="correct-count">0</div>
        <div class="stat-label">정답</div>
      </div>
      <div class="stat">
        <div class="stat-value wrong-val" id="wrong-count">0</div>
        <div class="stat-label">오답</div>
      </div>
      <div class="stat">
        <div class="stat-value score-val" id="score-pct">-</div>
        <div class="stat-label">정답률</div>
      </div>
    </div>

    <!-- 진행 바 -->
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <!-- 문제 -->
    <div class="question-box">
      <div class="question-text" id="question-text">
        <span id="q-a">?</span>
        <span class="op"> × </span>
        <span id="q-b">?</span>
        <span class="op"> = </span>
        <span id="q-ans">?</span>
      </div>
    </div>

    <!-- 입력 -->
    <div class="answer-row">
      <input type="number" id="answer-input" placeholder="정답 입력" min="1" max="81">
      <button id="submit-btn">확인</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>

  <!-- 결과 화면 -->
  <div id="result-screen" class="result-screen">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">완료!</div>
    <div class="result-score" id="result-score"></div>
    <button id="restart-btn">다시 도전</button>
  </div>
</div>

<script>
  const state = {
    selectedDans: new Set([2, 3, 4, 5]),
    mode: 10,       // 0 = unlimited
    total: 0,
    correct: 0,
    wrong: 0,
    currentA: 0,
    currentB: 0,
    answered: false,
  };

  // Build dan buttons
  const danContainer = document.getElementById('dan-buttons');
  for (let i = 2; i <= 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'dan-btn' + (state.selectedDans.has(i) ? ' active' : '');
    btn.textContent = i;
    btn.dataset.dan = i;
    btn.addEventListener('click', () => toggleDan(i, btn));
    danContainer.appendChild(btn);
  }

  function toggleDan(n, btn) {
    if (state.selectedDans.has(n)) {
      if (state.selectedDans.size === 1) return; // 최소 1개
      state.selectedDans.delete(n);
      btn.classList.remove('active');
    } else {
      state.selectedDans.add(n);
      btn.classList.add('active');
    }
    resetStats();
    nextQuestion();
  }

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = parseInt(btn.dataset.mode);
      const wrap = document.getElementById('progress-wrap');
      wrap.style.display = state.mode > 0 ? 'block' : 'none';
      resetStats();
      nextQuestion();
    });
  });

  function resetStats() {
    state.total = 0; state.correct = 0; state.wrong = 0;
    updateStats();
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
  }

  function nextQuestion() {
    state.answered = false;
    const dans = [...state.selectedDans];
    state.currentA = dans[Math.floor(Math.random() * dans.length)];
    state.currentB = Math.floor(Math.random() * 9) + 1;

    document.getElementById('q-a').textContent = state.currentA;
    document.getElementById('q-b').textContent = state.currentB;
    document.getElementById('q-ans').textContent = '?';

    const input = document.getElementById('answer-input');
    input.value = '';
    input.className = '';
    input.focus();
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
  }

  function updateStats() {
    document.getElementById('correct-count').textContent = state.correct;
    document.getElementById('wrong-count').textContent = state.wrong;
    const pct = state.total === 0 ? '-' : Math.round(state.correct / state.total * 100) + '%';
    document.getElementById('score-pct').textContent = pct;
  }

  function showResult() {
    const pct = state.total === 0 ? 0 : Math.round(state.correct / state.total * 100);
    let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '💪';
    let title = pct >= 90 ? '완벽해요!' : pct >= 70 ? '잘했어요!' : pct >= 50 ? '괜찮아요!' : '더 연습해요!';

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-score').textContent =
      `${state.total}문제 중 ${state.correct}개 정답 (${pct}%)`;

    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
  }

  function submitAnswer() {
    if (state.answered) { nextQuestion(); return; }

    const input = document.getElementById('answer-input');
    const val = parseInt(input.value);
    if (isNaN(val)) { input.focus(); return; }

    const correct = state.currentA * state.currentB;
    const fb = document.getElementById('feedback');
    state.total++;
    state.answered = true;

    document.getElementById('q-ans').textContent = correct;

    if (val === correct) {
      state.correct++;
      input.className = 'correct';
      fb.textContent = '✅ 정답!';
      fb.className = 'feedback correct';
    } else {
      state.wrong++;
      input.className = 'wrong';
      fb.textContent = `❌ 틀렸어요! 정답은 ${correct}`;
      fb.className = 'feedback wrong';
    }

    updateStats();

    if (state.mode > 0) {
      const pct = (state.total / state.mode) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';
      if (state.total >= state.mode) {
        setTimeout(showResult, 900);
        return;
      }
    }

    setTimeout(nextQuestion, 900);
  }

  document.getElementById('submit-btn').addEventListener('click', submitAnswer);
  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnswer();
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    resetStats();
    nextQuestion();
  });

  // Init
  document.getElementById('progress-wrap').style.display = state.mode > 0 ? 'block' : 'none';
  nextQuestion();
</script>
</body>
</html>
